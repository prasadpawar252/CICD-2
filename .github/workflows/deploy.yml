name: "sample react deploy workflow"

on:
  pull_request:
    branches:
        - master
    types:
        - closed    



jobs:
    build-and-test:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        
        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4

            - name: "setup node"
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: "install dependencies"
              run: npm install  

            - name: "run build"
              run: npm run build

            
